<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VoxelCraft — Minecraft Clone</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; font-family: system-ui, sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #crosshair {
    position: fixed; left: 50%; top: 50%; width: 20px; height: 20px;
    transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
  }
  #crosshair::before, #crosshair::after {
    content: ""; position: absolute; background: rgba(255,255,255,0.85);
    box-shadow: 0 0 2px rgba(0,0,0,0.6);
  }
  #crosshair::before { left: 9px; top: 0; width: 2px; height: 20px; }
  #crosshair::after { top: 9px; left: 0; height: 2px; width: 20px; }

  #hotbar {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 10; pointer-events: none;
  }
  .slot {
    width: 46px; height: 46px; border: 2px solid rgba(0,0,0,0.4);
    background: rgba(255,255,255,0.25); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #fff; text-shadow: 0 1px 2px #000; position: relative;
    pointer-events: auto; cursor: pointer; transition: transform 0.08s;
  }
  .slot.active { border-color: #fff; background: rgba(255,255,255,0.55); transform: scale(1.18); box-shadow: 0 0 8px rgba(255,255,255,0.7); }
  .slot .sw { width: 28px; height: 28px; border-radius: 4px; box-shadow: inset 0 0 0 2px rgba(0,0,0,0.15); }
  .slot .num { position: absolute; top: 1px; left: 4px; font-size: 10px; opacity: 0.8; }

  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; text-align: center; cursor: pointer;
  }
  #overlay h1 { font-size: 34px; margin-bottom: 10px; letter-spacing: 1px; }
  #overlay p { opacity: 0.85; margin: 4px 0; font-size: 14px; }
  #overlay .key { background: rgba(255,255,255,0.15); padding: 2px 7px; border-radius: 4px; font-family: monospace; }
  #overlay .play { margin-top: 18px; padding: 12px 26px; border: 2px solid #fff; border-radius: 8px; font-size: 16px; }
  #overlay .err { margin-top: 14px; max-width: 80%; font-size: 12px; color: #ff9b9b; word-break: break-word; }
  #hud { position: fixed; left: 10px; top: 8px; color: #fff; font-size: 12px; text-shadow: 0 1px 2px #000; z-index: 10; pointer-events: none; }
  #flash { position: fixed; inset: 0; background: #c01010; opacity: 0; pointer-events: none; z-index: 15; transition: opacity 0.12s; }
</style>
</head>
<body>
<div id="app"></div>
<div id="crosshair"></div>
<div id="hud"></div>
<div id="hotbar"></div>
<div id="overlay">
  <h1>VoxelCraft</h1>
  <p><b>Click to play</b></p>
  <p><span class="key">W S</span> move &nbsp; <span class="key">A D</span> turn &nbsp; <span class="key">Space</span> jump &nbsp; <span class="key">Shift</span> sprint</p>
  <p><span class="key">Mouse</span> look &nbsp; <span class="key">L-Click</span> break &nbsp; <span class="key">R-Click</span> place</p>
  <p><span class="key">1-7</span> select block &nbsp; <span class="key">Esc</span> release mouse</p>
  <p style="font-size:12px;opacity:0.7">If the mouse won't capture (e.g. inside an iframe): hold <b>Left-Mouse</b> and drag to look.</p>
  <p class="play" id="musicToggle">🔊 Music: ON</p>
  <p class="play">▶ Play</p>
  <p class="err" id="err"></p>
</div>
<div id="flash"></div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
